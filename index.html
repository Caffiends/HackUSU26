<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Typo Wrapped 2026</title>
</head>
<body class="bg-black text-white font-sans min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-gradient-to-br from-purple-900 via-black to-green-900 p-8 rounded-3xl shadow-2xl border border-white/10">

        <header class="text-center mb-10">
            <h1 class="text-xs uppercase tracking-widest text-green-400 font-bold mb-2">Your Year in Terminal</h1>
            <h2 class="text-5xl font-black italic italic tracking-tighter">TYPO<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-300">WRAPPED</span></h2>
        </header>

        <div class="flex justify-center mb-10">
            <div class="relative flex items-center justify-center w-40 h-40 rounded-full border-4 border-dashed border-green-500/30">
                <div class="text-center">
                    <p class="text-4xl font-bold" id="accuracy">--%</p>
                    <p class="text-[10px] uppercase text-gray-400">Accuracy</p>
                </div>
            </div>
        </div>

        <section class="space-y-6">
            <div>
                <h3 class="text-sm font-bold text-gray-400 mb-3 uppercase">Top Command</h3>
                <div class="bg-white/5 p-4 rounded-xl flex justify-between items-center border border-white/5">
                    <span class="text-xl font-mono text-green-300" id="top-cmd">loading...</span>
                    <span class="text-xs text-gray-500" id="top-cmd-count">-- uses</span>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-bold text-gray-400 mb-3 uppercase">The "Almost Had It" Award</h3>
                <p class="text-xs text-gray-500 mb-2">Your most common mistype:</p>
                <div class="bg-red-500/10 p-4 rounded-xl flex justify-between items-center border border-red-500/20">
                    <span class="text-xl font-mono text-red-400" id="top-mistype">--</span>
                    <span class="text-xs text-gray-500" id="mistype-count">-- times</span>
                </div>
            </div>
        </section>

        <footer class="mt-12 text-center">
            <p class="text-[10px] text-gray-500" id="uptime">Total Time Wasted: --</p>
        </header>
    </div>

    <script>
        fetch('stats.json')
            .then(res => res.json())
            .then(data => {
                const accuracy = ((data.meta.correct / data.meta.total_commands) * 100).toFixed(1);
                document.getElementById('accuracy').innerText = accuracy + '%';
                document.getElementById('top-cmd').innerText = data.top_cmds[0].name;
                document.getElementById('top-cmd-count').innerText = data.top_cmds[0].correct + ' uses';
                document.getElementById('top-mistype').innerText = data.mistypes[0].name;
                document.getElementById('mistype-count').innerText = data.mistypes[0].count + ' times';

                // Simple uptime conversion (seconds to H:M:S)
                const sec = data.meta.start_time; // Simplified for this sprint
                document.getElementById('uptime').innerText = "Session Active Since: " + new Date(sec * 1000).toLocaleTimeString();
            });
    </script>
</body>
</html>
